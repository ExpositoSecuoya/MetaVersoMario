Eso hace que la imagen se recorte y no pueda hacer scroll. Sustituye tu HTML por este:

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Poema</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      background: white;
      overflow-y: scroll;
      overflow-x: hidden;
    }

    body {
      display: block;
    }

    img {
      width: 100vw;
      height: auto;
      display: block;
    }

    /* Barra lateral más visible */
    ::-webkit-scrollbar {
      width: 18px;
    }

    ::-webkit-scrollbar-track {
      background: #e6e6e6;
    }

    ::-webkit-scrollbar-thumb {
      background: #555;
      border-radius: 10px;
      border: 4px solid #e6e6e6;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #222;
    }
  </style>
</head>

<body>
  <img src="./Mario_Dibujo03_Original.png" alt="Poema">
</body>
</html>
